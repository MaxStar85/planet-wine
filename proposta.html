<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genera Carta Vini</title>
  <link rel="stylesheet" href="/planet-wine/static/css/style.css">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    .page-proposta { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .page-header { flex-shrink: 0; }
    .proposta-content {
      width: 100%; max-width: clamp(700px, 75vw, 1100px); margin: 0 auto;
      flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;
    }
    .proposta-box {
      background: linear-gradient(180deg, #FBF8F2 0%, #F4EEE4 100%);
      border: 1px solid rgba(200, 169, 110, 0.14); border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(120, 98, 64, 0.10), 0 2px 10px rgba(44, 40, 37, 0.05), inset 0 1px 0 rgba(255,255,255,0.72);
      padding: clamp(20px, 2.5vw, 44px); width: 100%; height: 100%;
      display: flex; flex-direction: column; min-height: 0; overflow: hidden; box-sizing: border-box;
    }
    .proposta-top-row { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 18px; flex-wrap: wrap; flex-shrink: 0; }
    .top-col { flex: 1; min-width: 200px; }
    .sconto-col { flex: 0 0 200px; }
    .field-label { font-size: clamp(0.68rem, 0.75vw, 0.85rem); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; }
    .field-input {
      width: 100%; padding: clamp(10px, 1vw, 14px) clamp(14px, 1.4vw, 20px);
      border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm);
      font-size: clamp(0.85rem, 0.95vw, 1.05rem); font-family: "Inter", sans-serif;
      background: rgba(255,252,246,0.72); color: var(--text); outline: none;
      transition: border 0.15s, box-shadow 0.15s; box-sizing: border-box;
    }
    .field-input:focus { border-color: var(--gold); box-shadow: 0 6px 16px rgba(120, 98, 64, 0.08), inset 0 1px 0 rgba(255,255,255,0.55); }
    .file-input {
      width: 100%; padding: clamp(10px, 1vw, 14px); border: 1.5px dashed var(--gray-light);
      border-radius: var(--radius-sm); background: rgba(255,252,246,0.68);
      font-family: "Inter", sans-serif; color: var(--text); box-sizing: border-box; font-size: clamp(0.82rem, 0.9vw, 1rem);
    }
    .sconto-inline { display: flex; align-items: center; gap: 10px; }
    .sconto-inline input[type="checkbox"] {
      appearance: none; -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 5px; border: 1.5px solid var(--gray-light); background: rgba(255,252,246,0.8);
      cursor: pointer; position: relative; transition: all 0.15s ease; flex-shrink: 0;
    }
    .sconto-inline input[type="checkbox"]:checked { background: var(--bordeaux); border-color: var(--bordeaux); }
    .sconto-inline input[type="checkbox"]:checked::after { content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); color: white; font-size: 12px; font-weight: 700; }
    .sconto-input {
      width: clamp(60px, 5vw, 80px); padding: clamp(6px, 0.7vw, 10px) clamp(8px, 0.9vw, 14px);
      border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm);
      font-size: clamp(0.85rem, 0.95vw, 1.05rem); text-align: center;
      background: rgba(255,252,246,0.72); color: var(--text); outline: none; transition: border 0.15s;
    }
    .sconto-input:focus { border-color: var(--gold); }
    .sconto-pct { font-size: clamp(0.82rem, 0.92vw, 1rem); color: var(--text-light); }
    .vini-lista {
      display: flex; flex-direction: column; gap: 0; margin-bottom: 14px;
      flex: 1; min-height: 0; overflow-y: auto;
      border: 1px solid rgba(200, 169, 110, 0.14); border-radius: var(--radius-sm);
      padding: 8px; background: rgba(255, 255, 255, 0.3);
    }
    .riga-vino { display: flex; align-items: center; gap: clamp(10px, 1.2vw, 18px); padding: clamp(8px, 0.9vw, 12px) 0; border-bottom: 1px solid var(--cream-dark); }
    .riga-nome { flex: 1; min-width: 0; }
    .riga-nome strong { font-family: "Playfair Display", serif; font-size: clamp(0.82rem, 0.92vw, 1.05rem); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .riga-nome small { font-size: clamp(0.68rem, 0.75vw, 0.85rem); color: var(--text-light); }
    .riga-prezzo-orig { font-size: clamp(0.78rem, 0.88vw, 1rem); color: var(--text-light); text-decoration: line-through; flex-shrink: 0; }
    .sconto-individuale {
      width: clamp(55px, 4.5vw, 72px); padding: clamp(5px, 0.6vw, 9px) clamp(6px, 0.8vw, 12px);
      border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm);
      font-size: clamp(0.78rem, 0.88vw, 1rem); text-align: center;
      background: rgba(255,252,246,0.72); color: var(--text); outline: none;
      transition: border 0.15s, opacity 0.15s; flex-shrink: 0;
    }
    .sconto-individuale:focus { border-color: var(--gold); }
    .sconto-individuale:disabled { opacity: 0.3; pointer-events: none; }
    .riga-prezzo-scontato { font-family: "Playfair Display", serif; font-size: clamp(0.88rem, 1vw, 1.15rem); font-weight: 700; color: var(--bordeaux); flex-shrink: 0; min-width: clamp(70px, 6vw, 90px); text-align: right; }
    .riepilogo {
      background: rgba(255,255,255,0.35); border: 1px solid rgba(200, 169, 110, 0.10);
      border-radius: var(--radius-sm); padding: clamp(12px, 1.4vw, 20px) clamp(16px, 1.8vw, 28px);
      margin-bottom: 12px; flex-shrink: 0;
    }
    .riepilogo-riga { display: flex; justify-content: space-between; align-items: center; margin-bottom: clamp(4px, 0.5vw, 8px); font-size: clamp(0.8rem, 0.9vw, 1rem); }
    .riepilogo-riga:last-child { margin-bottom: 0; }
    .riepilogo-riga.risparmio { color: var(--olive); font-weight: 600; margin-top: clamp(6px, 0.8vw, 12px); padding-top: clamp(6px, 0.8vw, 12px); border-top: 1px solid var(--gray-light); }
    .riepilogo-riga span:last-child { font-family: "Playfair Display", serif; font-weight: 600; }
.btn-genera {
      width: 100%;
      background: linear-gradient(rgba(70, 52, 44, 0.18), rgba(70, 52, 44, 0.18)), url("/planet-wine/static/img/btn_acquarello.png") center/118% auto no-repeat;
      color: white; border: 1px solid rgba(255,255,255,0.10); border-radius: 50px;
      padding: clamp(14px, 1.4vw, 20px); font-size: clamp(0.88rem, 1vw, 1.1rem);
      font-weight: 500; cursor: pointer; letter-spacing: 0.04em;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 22px rgba(101, 92, 86, 0.22), 0 2px 8px rgba(44, 40, 37, 0.05), inset 0 1px 0 rgba(255,255,255,0.14);
      flex-shrink: 0;
    }
    .btn-genera:hover { transform: translateY(-1px); box-shadow: 0 14px 26px rgba(101, 92, 86, 0.26), 0 3px 10px rgba(44, 40, 37, 0.06), inset 0 1px 0 rgba(255,255,255,0.16); }

    @media (max-width: 860px) {
      .page-proposta .page-header {
        display: none;
      }

      .page.top.page-proposta {
        padding-top: clamp(60px, 7vw, 80px);
      }

      .proposta-box {
        padding: 14px;
      }

      .proposta-top-row {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }

      .top-col {
        flex: 1 1 calc(50% - 5px);
        min-width: 0;
      }

      .sconto-col {
        flex: 0 0 100%;
      }

      .field-label {
        font-size: 0.65rem;
        margin-bottom: 4px;
      }

      .field-input, .file-input {
        padding: 8px 10px;
        font-size: 0.82rem;
      }

      .vini-lista {
        margin-bottom: 8px;
      }

      .riepilogo {
        padding: 10px 12px;
        margin-bottom: 8px;
      }

      .riepilogo-riga {
        font-size: 0.78rem;
        margin-bottom: 4px;
      }

      .btn-genera {
        padding: 12px;
        font-size: 0.88rem;
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body style="opacity:0">
  <a href="#" onclick="event.preventDefault(); goBack()" class="btn-back">← Indietro</a>
  <a href="/planet-wine/index.html" class="btn-home">⌂ Home</a>

  <div class="page top page-proposta">
    <div class="page-header">
      <h1>Genera Carta Vini</h1>
      <p>Inserisci i dati del locale e genera il PDF</p>
    </div>

    <div class="proposta-content">
      <div class="proposta-box">

        <div class="proposta-top-row">
          <div class="top-col">
            <div class="field-label">Locale</div>
            <input class="field-input" type="text" id="cliente" placeholder="Nome del locale">
          </div>
          <div class="top-col">
            <div class="field-label">Logo (opzionale)</div>
            <input class="file-input" type="file" id="logo" accept=".png,.jpg,.jpeg">
          </div>
          <div class="top-col sconto-col">
            <div class="field-label">Sconto globale</div>
            <div class="sconto-inline">
              <input type="checkbox" id="sconto-globale-check" checked onchange="toggleSconto()">
              <input class="sconto-input" type="number" id="sconto-globale" placeholder="0" min="0" max="100" oninput="ricalcola()">
              <span class="sconto-pct">%</span>
            </div>
          </div>
        </div>

        <div class="vini-lista" id="vini-lista"></div>

        <div class="riepilogo">
          <div class="riepilogo-riga"><span>Vini selezionati</span><span id="r-count">0</span></div>
          <div class="riepilogo-riga"><span>Totale listino</span><span id="r-listino">€ 0,00</span></div>
          <div class="riepilogo-riga"><span>Totale scontato</span><span id="r-scontato">€ 0,00</span></div>
          <div class="riepilogo-riga risparmio"><span>Risparmio cliente</span><span id="r-risparmio">€ 0,00</span></div>
          <div class="riepilogo-riga" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-light);">
            <span>Includi totali nel PDF</span>
            <div class="sconto-inline"><input type="checkbox" id="includi-totali" checked></div>
          </div>
        </div>

        <button class="btn-genera" onclick="generaPDF()">Genera Carta Vini PDF</button>

      </div>
    </div>
  </div>

  <script src="/planet-wine/static/js/main.js"></script>
  <script src="/planet-wine/static/libs/jspdf.umd.min.js"></script>
  <script>
    const carrello = getCarrello();

    const _pCliente = localStorage.getItem("proposta_cliente");
    const _pSconto  = localStorage.getItem("proposta_sconto");
    if (_pCliente) { document.getElementById("cliente").value = _pCliente; localStorage.removeItem("proposta_cliente"); }
    if (_pSconto !== null) {
      const val = parseFloat(_pSconto) || 0;
      if (val > 0) document.getElementById("sconto-globale").value = val;
      localStorage.removeItem("proposta_sconto");
    }

    function toggleSconto() {
      const globale = document.getElementById("sconto-globale-check").checked;
      document.querySelectorAll(".sconto-individuale").forEach(el => { el.disabled = globale; });
      ricalcola();
    }

    function parsePrezzo(val) {
      const raw = String(val || "").replace("€", "").replace(/\s+/g, "").replace(",", ".");
      const num = parseFloat(raw);
      return isNaN(num) ? NaN : num;
    }

    function ricalcola() {
      const globale = document.getElementById("sconto-globale-check").checked;
      const pctGlob = parseFloat(document.getElementById("sconto-globale").value) || 0;
      let totListino = 0, totScontato = 0;
      carrello.forEach(v => {
        const p = parsePrezzo(v.prezzo);
        if (isNaN(p)) return;
        totListino += p;
        const pct = globale ? pctGlob : (parseFloat(document.getElementById("sc_" + v.codice)?.value) || 0);
        const scontato = p * (1 - pct / 100);
        totScontato += scontato;
        const el = document.getElementById("pr_" + v.codice);
        if (el) el.textContent = "€ " + scontato.toFixed(2).replace(".", ",");
      });
      document.getElementById("r-count").textContent = carrello.length;
      document.getElementById("r-listino").textContent = "€ " + totListino.toFixed(2).replace(".", ",");
      document.getElementById("r-scontato").textContent = "€ " + totScontato.toFixed(2).replace(".", ",");
      document.getElementById("r-risparmio").textContent = "€ " + (totListino - totScontato).toFixed(2).replace(".", ",");
    }

    function renderVini() {
      const lista = document.getElementById("vini-lista");
      lista.innerHTML = "";
      carrello.forEach(v => {
        const p = parsePrezzo(v.prezzo);
        const div = document.createElement("div");
        div.className = "riga-vino";
        div.innerHTML = `
          <div class="riga-nome">
            <strong>${v.nome}</strong>
            <small>${v.cantina} · ${v.tipo} · ${v.cap} L</small>
          </div>
          <div class="riga-prezzo-orig">${isNaN(p) ? (v.prezzo || "—") : "€ " + p.toFixed(2).replace(".", ",")}</div>
          <input class="sconto-individuale" type="number" id="sc_${v.codice}" value="0" min="0" max="100" oninput="ricalcola()" disabled>
          <span class="sconto-pct">%</span>
          <div class="riga-prezzo-scontato" id="pr_${v.codice}">${isNaN(p) ? (v.prezzo || "—") : "€ " + p.toFixed(2).replace(".", ",")}</div>
        `;
        lista.appendChild(div);
      });
      ricalcola();
      showPage();
    }

    renderVini();

    function salvaSnapshotCorrente() {
      const cliente = document.getElementById("cliente").value.trim();
      const globale = document.getElementById("sconto-globale-check").checked;
      const pctGlob = parseFloat(document.getElementById("sconto-globale").value) || 0;
      salvaPropostaSnapshot(cliente, globale ? pctGlob : 0, carrello);
    }

    // ── GENERA PDF ────────────────────────────────────────────────────────────
    async function generaPDF() {
      const cliente = document.getElementById("cliente").value.trim();
      if (!cliente) {
        showPWModal({ title: "Dato mancante", message: "Inserisci il nome del locale prima di generare la Carta Vini.", actions: [{ label: "Chiudi", primary: true }] });
        return;
      }

      const globale = document.getElementById("sconto-globale-check").checked;
      const pctGlob = parseFloat(document.getElementById("sconto-globale").value) || 0;
      const logoFile = document.getElementById("logo").files[0] || null;
      const includiTotali = document.getElementById("includi-totali").checked;

      let logoDataUrl = null;
      if (logoFile) {
        logoDataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(logoFile);
        });
      }

      const viniConSconto = carrello.map(v => {
        const p = parsePrezzo(v.prezzo);
        const pct = globale ? pctGlob : (parseFloat(document.getElementById("sc_" + v.codice)?.value) || 0);
        return { ...v, prezzoNum: isNaN(p) ? null : p, pct, prezzoScontato: isNaN(p) ? null : parseFloat((p * (1 - pct / 100)).toFixed(2)) };
      });

      const totListino  = viniConSconto.reduce((s, v) => s + (v.prezzoNum || 0), 0);
      const totScontato = viniConSconto.reduce((s, v) => s + (v.prezzoScontato || 0), 0);
      const risparmio   = totListino - totScontato;

      // ── STRUTTURA DATI ────────────────────────────────────────────────────
      const tipiOrdine = [
        "Champagne","Champagne Rosé","Spumante","Spumante Rosé",
        "Vino Bianco","Vino Rosato","Rosato","Vino Rosé","Rosé",
        "Vino Rosso","Vino Dolce/Passito","Vino Dolce",
        "Sparkling Tea","Succo d'Uva Rosso","Succo d'Uva Bianco",
        "Spumante Dealcolato","Vino Bianco Dealcolato"
      ];

      function macroCategoria(tipo) {
        if (["Champagne","Champagne Rosé","Spumante","Spumante Rosé"].includes(tipo)) return "BOLLICINE";
        if (["Vino Bianco"].includes(tipo)) return "BIANCHI";
        if (["Vino Rosato","Rosato","Vino Rosé","Rosé"].includes(tipo)) return "ROSATI";
        if (["Vino Rosso"].includes(tipo)) return "ROSSI";
        if (["Vino Dolce/Passito","Vino Dolce"].includes(tipo)) return "DOLCI E PASSITI";
        return "ANALCOLICI";
      }

      const struttura = {};
      viniConSconto.forEach(v => {
        const macro = macroCategoria(v.tipo);
        const tipo  = v.tipo || "";
        const areaV = v.area || "";
        const cant  = v.cantina || "";
        if (!struttura[macro]) struttura[macro] = {};
        if (!struttura[macro][tipo]) struttura[macro][tipo] = {};
        if (!struttura[macro][tipo][areaV]) struttura[macro][tipo][areaV] = {};
        if (!struttura[macro][tipo][areaV][cant]) struttura[macro][tipo][areaV][cant] = [];
        struttura[macro][tipo][areaV][cant].push(v);
      });

      const ordMacro = ["BOLLICINE","BIANCHI","ROSATI","ROSSI","DOLCI E PASSITI","ANALCOLICI"];
      const areeSpeciali = new Set(["Champagne","Analcolici","RestoDelMondo",""]);

      // ── FUNZIONI DI ALTEZZA (usate sia nel dry-run che nel rendering) ─────
      function altezzaVino(v, sc) {
        let h = 5 * sc;
        if (v.s1 || v.s2 || v.s3) h += 4 * sc;
        h += 4 * sc;
        h += 3 * sc;
        return h;
      }

      function altezzaMacro(macro, sc) {
        if (!struttura[macro]) return 0;
        let h = (14 + 8) * sc;
        const tipi = Object.keys(struttura[macro]).sort((a,b) => tipiOrdine.indexOf(a) - tipiOrdine.indexOf(b));
        tipi.forEach(tipo => {
          if (tipi.length > 1) h += 12 * sc;
          Object.keys(struttura[macro][tipo]).forEach(areaV => {
            const mostraArea = !areeSpeciali.has(areaV) && Object.keys(struttura[macro][tipo]).some(a => !areeSpeciali.has(a));
            if (mostraArea) h += 10 * sc;
            Object.keys(struttura[macro][tipo][areaV]).forEach(cant => {
              const vini = struttura[macro][tipo][areaV][cant];
              h += 8 * sc;
              vini.forEach(v => { h += altezzaVino(v, sc); });
              h += 2 * sc;
            });
          });
          h += 3 * sc;
        });
        h += 4 * sc;
        return h;
      }

      // ── DRY RUN: conta pagine per una data scala ──────────────────────────
      function simulaPagine(sc) {
        const pageH = 283;
        let y = 14;
        let pagine = 1;

        function checkPage(mm) {
          if (y + mm > pageH) { pagine++; y = 14; }
        }

        // Intestazione
        if (logoDataUrl) y += 24 * sc;
        y += (8 + 8 + 18) * sc;

        let prima = true;
        ordMacro.forEach(macro => {
          if (!struttura[macro]) return;
          if (!prima) {
            const alt = altezzaMacro(macro, sc);
            if (y + alt > pageH) { pagine++; y = 14; }
          }
          prima = false;

          y += (14 + 8) * sc;

          const tipi = Object.keys(struttura[macro]).sort((a,b) => tipiOrdine.indexOf(a) - tipiOrdine.indexOf(b));
          tipi.forEach(tipo => {
            if (tipi.length > 1) { checkPage(12 * sc); y += 12 * sc; }
            Object.keys(struttura[macro][tipo]).forEach(areaV => {
              const mostraArea = !areeSpeciali.has(areaV) && Object.keys(struttura[macro][tipo]).some(a => !areeSpeciali.has(a));
              if (mostraArea) { checkPage(10 * sc); y += 10 * sc; }
              Object.keys(struttura[macro][tipo][areaV]).forEach(cant => {
                const vini = struttura[macro][tipo][areaV][cant];
                const spazio = 8 * sc + altezzaVino(vini[0], sc);
                if (y + spazio > pageH) { pagine++; y = 14; }
                y += 8 * sc;
                vini.forEach((v, vi) => {
                  if (vi > 0 && y + altezzaVino(v, sc) > pageH) { pagine++; y = 14 + 9 * sc; }
                  y += altezzaVino(v, sc);
                });
                y += 2 * sc;
              });
            });
            y += 3 * sc;
          });
          y += 4 * sc;
        });

        if (includiTotali) { checkPage(28 * sc); y += 28 * sc; }
        y += 6; // nota legale
        return pagine;
      }

      // ── TROVA SCALA OTTIMALE ──────────────────────────────────────────────
      // Scala solo se produce effettivamente una pagina in meno.
      // Non scendere sotto 0.80 per mantenere leggibilità professionale.
      const SCALA_MIN = 0.80;
      const PASSO = 0.05;
      let scalaFinale = 1.0;
      let pagineAttuali = simulaPagine(1.0);

      for (let s = Math.round((1.0 - PASSO) * 100) / 100; s >= SCALA_MIN; s = Math.round((s - PASSO) * 100) / 100) {
        const p = simulaPagine(s);
        if (p < pagineAttuali) {
          // La riduzione vale: salva e continua a cercare
          pagineAttuali = p;
          scalaFinale = s;
        }
        // Se non migliora, continua comunque a cercare scale inferiori
        // che potrebbero saltare una pagina ulteriore
      }

      // Verifica finale: se la scala trovata non migliora rispetto a 1.0, usa 1.0
      if (simulaPagine(scalaFinale) >= simulaPagine(1.0)) {
        scalaFinale = 1.0;
      }

      const sc = scalaFinale;

      // ── RENDERING REALE ───────────────────────────────────────────────────
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      const W = 210, marginL = 14, marginR = 14;
      const contentW = W - marginL - marginR;
      const pageH = 283;
      let y = 14;

      const colore = {
        bordeaux: [110, 35, 52], bronzo: [142, 105, 50], argento: [115, 108, 98],
        testo: [42, 38, 35], chiaro: [135, 120, 105], linea: [210, 198, 180], verde: [65, 108, 70]
      };

      function nuovaPaginaSe(mm) {
        if (y + mm > pageH) { doc.addPage(); y = 14; return true; }
        return false;
      }

      // Font scalati con minimi di leggibilità
      const f = {
        titolo:    Math.max(10,   22   * sc),
        sottotit:  Math.max(7,    11   * sc),
        macro:     Math.max(9,    16   * sc),
        tipo:      Math.max(7,    11   * sc),
        area:      Math.max(6.5,  9    * sc),
        cantina:   Math.max(6.5,  9    * sc),
        nome:      Math.max(6,    8.5  * sc),
        prezzo:    Math.max(6,    9    * sc),
        pct:       Math.max(5.5,  7    * sc),
        prezzoOr:  Math.max(5.5,  7.5  * sc),
        sentori:   Math.max(5.5,  7.5  * sc),
        dettagli:  Math.max(5,    7    * sc),
        nota:      Math.max(5,    7    * sc),
      };

      // ── LOGO ──────────────────────────────────────────────────────────────
      if (logoDataUrl) {
        try {
          const ext = logoFile.name.split(".").pop().toLowerCase() === "jpg" ? "JPEG" : logoFile.name.split(".").pop().toUpperCase();
          doc.addImage(logoDataUrl, ext, marginL, y, 40 * sc, 18 * sc);
          y += 24 * sc;
        } catch(e) {}
      }

      // ── INTESTAZIONE ──────────────────────────────────────────────────────
      doc.setFont("helvetica", "bold"); doc.setFontSize(f.titolo); doc.setTextColor(...colore.testo);
      doc.text(cliente.toUpperCase(), W / 2, y, { align: "center" });
      y += 8 * sc;

      doc.setFont("helvetica", "italic"); doc.setFontSize(f.sottotit); doc.setTextColor(...colore.chiaro);
      doc.text("Carta dei Vini", W / 2, y, { align: "center" });
      y += 18 * sc;

      // ── MACRO SEZIONI ─────────────────────────────────────────────────────
      let primaMacro = true;

      ordMacro.forEach(macro => {
        if (!struttura[macro]) return;

        if (!primaMacro) {
          if (y + altezzaMacro(macro, sc) > pageH) { doc.addPage(); y = 14; }
        }
        primaMacro = false;

        // Titolo macro
        doc.setFont("helvetica", "bold"); doc.setFontSize(f.macro); doc.setTextColor(...colore.bordeaux);
        doc.text(macro, marginL, y);
        y += 4 * sc;
        doc.setDrawColor(...colore.bordeaux); doc.setLineWidth(0.5 * sc);
        doc.line(marginL, y, W - marginR, y);
        y += 8 * sc;

        const tipiInMacro = Object.keys(struttura[macro]).sort((a,b) => tipiOrdine.indexOf(a) - tipiOrdine.indexOf(b));

        tipiInMacro.forEach(tipo => {
          const areeInTipo = struttura[macro][tipo];

          if (tipiInMacro.length > 1) {
            nuovaPaginaSe(12 * sc);
            doc.setFont("helvetica", "bold"); doc.setFontSize(f.tipo); doc.setTextColor(...colore.bronzo);
            doc.text(tipo, W / 2, y, { align: "center" });
            y += 6 * sc;
          }

          Object.keys(areeInTipo).forEach(areaV => {
            const cantineInArea = areeInTipo[areaV];
            const mostraArea = !areeSpeciali.has(areaV) && Object.keys(areeInTipo).some(a => !areeSpeciali.has(a));

            if (mostraArea) {
              nuovaPaginaSe(10 * sc);
              doc.setFont("helvetica", "bold"); doc.setFontSize(f.area); doc.setTextColor(...colore.argento);
              doc.text(areaV.toUpperCase(), W / 2, y, { align: "center" });
              y += 6 * sc;
            }

            Object.keys(cantineInArea).forEach(cantina => {
              const vini = cantineInArea[cantina];

              // Cantina + primo vino insieme
              if (y + 8 * sc + altezzaVino(vini[0], sc) > pageH) { doc.addPage(); y = 14; }
              doc.setFont("helvetica", "bold"); doc.setFontSize(f.cantina); doc.setTextColor(...colore.bronzo);
              doc.text(cantina, marginL, y);
              y += 4 * sc;

              vini.forEach((v, vi) => {
                if (vi > 0 && y + altezzaVino(v, sc) > pageH) {
                  doc.addPage(); y = 14;
                  doc.setFont("helvetica", "bold"); doc.setFontSize(f.cantina); doc.setTextColor(...colore.bronzo);
                  doc.text(cantina + " (segue)", marginL, y);
                  y += 4 * sc + 3 * sc;
                }

                const haSconto = v.pct > 0 && v.prezzoNum !== null;
                const sentoriStr = [v.s1, v.s2, v.s3].filter(Boolean).join(" · ");
                const nomeMaxW = contentW - 52 * sc;

                // Riga nome
                doc.setFont("helvetica", "bold"); doc.setFontSize(f.nome); doc.setTextColor(...colore.testo);
                doc.text(doc.splitTextToSize((v.nome || "").toUpperCase(), nomeMaxW)[0], marginL, y);

                // Prezzi
                if (v.prezzoNum !== null) {
                  if (haSconto) {
                    const origStr = v.prezzoNum.toFixed(2).replace(".", ",");
                    const pctStr  = `-${v.pct}%`;
                    const scStr   = "€ " + v.prezzoScontato.toFixed(2).replace(".", ",");

                    doc.setFont("helvetica", "bold"); doc.setFontSize(f.prezzo); doc.setTextColor(...colore.bordeaux);
                    doc.text(scStr, W - marginR, y, { align: "right" });
                    const scW = doc.getTextWidth(scStr);

                    doc.setFont("helvetica", "bold"); doc.setFontSize(f.pct); doc.setTextColor(...colore.bordeaux);
                    const pctX = W - marginR - scW - 2;
                    doc.text(pctStr, pctX, y, { align: "right" });
                    const pctWw = doc.getTextWidth(pctStr);

                    doc.setFont("helvetica", "normal"); doc.setFontSize(f.prezzoOr); doc.setTextColor(...colore.chiaro);
                    const origX = pctX - pctWw - 3;
                    const origW = doc.getTextWidth(origStr);
                    doc.text(origStr, origX, y, { align: "right" });
                    doc.setDrawColor(...colore.chiaro); doc.setLineWidth(0.2);
                    doc.line(origX - origW, y - 1.2 * sc, origX, y - 1.2 * sc);
                  } else {
                    doc.setFont("helvetica", "bold"); doc.setFontSize(f.prezzo); doc.setTextColor(...colore.bordeaux);
                    doc.text("€ " + v.prezzoNum.toFixed(2).replace(".", ","), W - marginR, y, { align: "right" });
                  }
                }
                y += 5 * sc;

                // Sentori
                if (sentoriStr) {
                  doc.setFont("helvetica", "italic"); doc.setFontSize(f.sentori); doc.setTextColor(...colore.chiaro);
                  doc.text(doc.splitTextToSize(sentoriStr, nomeMaxW)[0], marginL, y);
                  y += 4 * sc;
                }

                // Dettagli
                const det = [];
                if (v.codice) det.push(String(parseInt(v.codice)));
                if (v.uvaggio) det.push(v.uvaggio);
                if (v.millesimo) det.push(v.millesimo);
                if (v.mesi) det.push(v.mesi + " mesi");
                if (v.cap) det.push((parseFloat(v.cap) * 100).toFixed(0) + " cl");
                if (det.length) {
                  doc.setFont("helvetica", "normal"); doc.setFontSize(f.dettagli); doc.setTextColor(...colore.chiaro);
                  doc.text(doc.splitTextToSize(det.join(" · "), nomeMaxW)[0], marginL, y);
                  y += 4 * sc;
                }

                y += 3 * sc;
              });

              y += 2 * sc;
            });
          });
          y += 3 * sc;
        });
        y += 4 * sc;
      });

      // ── TOTALI ────────────────────────────────────────────────────────────
      if (includiTotali) {
        nuovaPaginaSe(28 * sc);
        doc.setDrawColor(...colore.linea); doc.setLineWidth(0.4);
        doc.line(marginL, y, W - marginR, y);
        y += 8 * sc;

        doc.setFont("helvetica", "normal"); doc.setFontSize(Math.max(7, 9 * sc)); doc.setTextColor(...colore.testo);
        doc.text("Totale listino:", marginL, y);
        doc.setFont("helvetica", "bold");
        doc.text("€ " + totListino.toFixed(2).replace(".", ","), W - marginR, y, { align: "right" });
        y += 6 * sc;

        doc.setFont("helvetica", "normal"); doc.setFontSize(Math.max(7, 9 * sc)); doc.setTextColor(...colore.testo);
        doc.text("Totale scontato:", marginL, y);
        doc.setFont("helvetica", "bold"); doc.setFontSize(Math.max(7, 10 * sc)); doc.setTextColor(...colore.bordeaux);
        doc.text("€ " + totScontato.toFixed(2).replace(".", ","), W - marginR, y, { align: "right" });
        y += 6 * sc;

        doc.setFont("helvetica", "bold"); doc.setFontSize(Math.max(7, 9 * sc)); doc.setTextColor(...colore.verde);
        doc.text("Risparmio cliente:", marginL, y);
        doc.text("€ " + risparmio.toFixed(2).replace(".", ","), W - marginR, y, { align: "right" });
        y += 10 * sc;
      }

      // ── NOTA LEGALE ───────────────────────────────────────────────────────
      doc.setFont("helvetica", "italic"); doc.setFontSize(f.nota); doc.setTextColor(...colore.chiaro);
      doc.text("Prezzi espressi in euro. Disponibilità, annate e formati soggetti a conferma al momento dell'ordine.", W / 2, y, { align: "center" });

      // ── SALVA ─────────────────────────────────────────────────────────────
      const nomeFile = `Carta_Vini_${cliente.replace(/\s+/g, "_")}.pdf`;
      doc.save(nomeFile);
      salvaSnapshotCorrente();

      showPWModal({
        title: "PDF generato",
        message: `"${nomeFile}" scaricato.\nScala applicata: ${Math.round(sc * 100)}%`,
        actions: [{ label: "Chiudi", primary: true }]
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/planet-wine/sw.js', { scope: '/planet-wine/' })
        .then(reg => console.log('✓ Service Worker registrato', reg))
        .catch(err => console.error('✗ Service Worker fallito:', err));
    }
  </script>
</body>
</html>
