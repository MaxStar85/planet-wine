<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo Vini — Planet Bevande</title>
  <link rel="manifest" href="/planet-wine/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PlanetWine">
  <link rel="apple-touch-icon" href="/planet-wine/static/img/PlanetWine.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/planet-wine/static/img/PlanetWine.png">
  <link rel="stylesheet" href="/planet-wine/static/css/style.css">

</head>
<body data-wait style="opacity:0">
  <div class="home-page">
    <div class="home-inner">
      <div class="home-logo-header">Planet Bevande · Catalogo 2026</div>

      <div class="home-header">
        <h1>Catalogo Vini</h1>
        <p>Seleziona una categoria</p>
      </div>

      <div class="home-grid">

        <a href="/planet-wine/lista.html?tipo=Champagne&area=Champagne" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/champagne.png" alt="Champagne" class="bottiglia-img img-champagne">
          </div>
          <span class="label">Champagne</span>
        </a>

        <a href="/planet-wine/bivio.html?tipo=Spumante" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/spumante.png" alt="Spumanti" class="bottiglia-img img-spumante">
          </div>
          <span class="label">Spumanti</span>
        </a>

        <a href="/planet-wine/bivio.html?tipo=Vino Bianco" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/bianco.png" alt="Vini Bianchi" class="bottiglia-img img-bianco">
          </div>
          <span class="label">Vini Bianchi</span>
        </a>

        <a href="/planet-wine/bivio.html?tipo=Vino Rosato" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/rosato.png" alt="Vini Rosati" class="bottiglia-img img-rosato">
          </div>
          <span class="label">Vini Rosati</span>
        </a>

        <a href="/planet-wine/bivio.html?tipo=Vino Rosso" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/rosso.png" alt="Vini Rossi" class="bottiglia-img img-rosso">
          </div>
          <span class="label">Vini Rossi</span>
        </a>

        <a href="/planet-wine/bivio.html?tipo=Vino Dolce/Passito" class="tasto">
          <div class="bottiglia-box">
            <img src="/planet-wine/static/img/dolce.png" alt="Vini Dolci" class="bottiglia-img img-dolce">
          </div>
          <span class="label">Vini Dolci</span>
        </a>

      </div>

      <a href="/planet-wine/lista.html?tipo=Analcolici&area=Analcolici" class="tasto-analcolici">
        <span>✦ Selezione Analcolica ✦</span>
      </a>

    </div>
  </div>

<button class="filtro-btn" onclick="apriFiltro()">
  <svg viewBox="0 0 24 24" class="filtro-icon">
    <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z"/>
  </svg>
</button>

<button class="filtro-reset" id="filtro-reset" onclick="resetFiltro()" title="Disattiva filtro">
  ✕
</button>

<a href="/planet-wine/carrello.html" class="carrello-btn">
  Carrello <span class="badge">0</span>
</a>

  <script src="/planet-wine/static/js/main.js"></script>
  <script>
    const homeImages = [
      "/planet-wine/static/img/champagne.png",
      "/planet-wine/static/img/spumante.png",
      "/planet-wine/static/img/bianco.png",
      "/planet-wine/static/img/rosato.png",
      "/planet-wine/static/img/rosso.png",
      "/planet-wine/static/img/dolce.png"
    ];

    preloadImages(homeImages).then(() => {
      showPage();
    });

    /* ── FILTRO PREZZO ──────────────────────────────────────────── */

    function aggiornaStatoFiltroUI() {
      const filtro = getFiltro();
      const btn = document.querySelector(".filtro-btn");
      const reset = document.querySelector(".filtro-reset");

      if (filtro && (filtro.min || filtro.max)) {
        btn.classList.add("attivo");
        reset.classList.add("visibile");
      } else {
        btn.classList.remove("attivo");
        reset.classList.remove("visibile");
      }

      applyFiltroToLinks();
    }

    function apriFiltro() {
      apriFiltroModal();
    }

    function resetFiltro() {
      clearFiltro();
      aggiornaStatoFiltroUI();
    }

    aggiornaStatoFiltroUI();
    applyFiltroToLinks();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/planet-wine/sw.js', { scope: '/planet-wine/' })
        .then(reg => console.log('✓ Service Worker registrato', reg))
        .catch(err => console.error('✗ Service Worker fallito:', err));
    }

  </script>
</body>
</html>
