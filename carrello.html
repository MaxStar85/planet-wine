<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrello</title>
  <link rel="stylesheet" href="/planet-wine/static/css/style.css">

</head>
<body style="opacity:0">
  <a href="#" onclick="event.preventDefault(); goBack()" class="btn-back">← Indietro</a>
  <a href="/planet-wine/index.html" class="btn-home">⌂ Home</a>

  <div class="page top page-carrello">
    <div class="page-header">
      <h1>Selezione</h1>
      <p id="contatore">0 etichette selezionate</p>
    </div>

    <!-- PROPOSTE SALVATE -->
    <div class="proposte-wrapper">
      <div class="proposte-header" onclick="toggleProposte()">
        <span class="proposte-titolo">📋 Proposte salvate</span>
        <span class="proposte-badge" id="proposte-badge">0</span>
        <span class="proposte-arrow" id="proposte-arrow">▼</span>
      </div>

      <div class="proposte-panel" id="proposte-panel" style="display:none">
        <input
          type="text"
          class="proposte-search"
          id="proposte-search"
          placeholder="Cerca cliente..."
          oninput="renderProposte()"
        >
        <div class="proposte-lista" id="proposte-lista"></div>
      </div>
    </div>

    <div class="carrello-content">

      <div class="carrello-scroll">
        <div class="carrello-lista" id="lista"></div>

        <div id="vuoto">
          Nessun vino selezionato.<br>
          <a href="/planet-wine/index.html">← Torna al catalogo</a>
        </div>
      </div>

      <div class="carrello-footer" id="footer" style="display:none">
        <div>
          <div class="totale-label">Totale listino</div>
          <div class="totale-valore" id="totale">€ 0,00</div>
        </div>

        <div class="footer-actions">
          <button class="btn-svuota" onclick="confermaVuotaCarrello()">
            Svuota carrello
          </button>

          <button class="btn-proposta" onclick="navigateTo('/planet-wine/proposta.html')">
            Genera Proposta →
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="/planet-wine/static/js/main.js"></script>
  <script>

    // ── RENDER CARRELLO ───────────────────────────────────────────────────────
    function renderCarrello() {
      const c = getCarrello();
      const lista = document.getElementById("lista");
      const footer = document.getElementById("footer");
      const vuoto = document.getElementById("vuoto");
      const contatore = document.getElementById("contatore");

      lista.innerHTML = "";

      if (c.length === 0) {
        vuoto.style.display = "block";
        footer.style.display = "none";
        contatore.textContent = "0 etichette selezionate";
        showPage();
        return;
      }

      vuoto.style.display = "none";
      footer.style.display = "flex";
      contatore.textContent =
        c.length + " etichett" + (c.length === 1 ? "a" : "e") +
        " selezionat" + (c.length === 1 ? "a" : "e");

      let tot = 0;

      c.forEach(v => {
        const p = parseFloat(String(v.prezzo).replace(",", "."));
        if (!isNaN(p)) tot += p;

        let cls = "";
        if (v.tipo === "Spumante" || v.tipo === "Champagne")               cls = "spumante";
        else if (v.tipo === "Spumante Rosé" || v.tipo === "Champagne Rosé") cls = "spumante-rose";
        else if (v.tipo === "Vino Bianco")                                  cls = "bianco";
        else if (v.tipo === "Vino Rosato")                                  cls = "rosato";
        else if (v.tipo === "Vino Rosso")                                   cls = "rosso";
        else if (v.tipo === "Vino Dolce/Passito" || v.tipo === "Vino Dolce") cls = "dolce";
        else if (v.tipo === "Sparkling Tea")                                cls = "sparkling-tea";
        else if (v.tipo === "Succo d'Uva Rosso" || v.tipo === "Succo d'Uva Bianco") cls = "succo";
        else if (v.tipo === "Spumante Dealcolato" || v.tipo === "Vino Bianco Dealcolato") cls = "dealcolato";

        const div = document.createElement("div");
        div.className = `item-carrello ${cls}`;
        div.innerHTML = `
          <div class="item-testo">
            <div class="item-nome">${v.nome}</div>
            <div class="item-sub">${v.cantina} · ${v.tipo} · ${v.cap} L</div>
          </div>
          <div class="item-prezzo">
            ${isNaN(p) ? v.prezzo : "€ " + p.toFixed(2).replace(".", ",")}
          </div>
          <button class="btn-rimuovi" onclick="rimuoviVino('${v.codice}'); renderCarrello()">✕</button>
        `;
        lista.appendChild(div);
      });

      document.getElementById("totale").textContent =
        "€ " + tot.toFixed(2).replace(".", ",");

      showPage();
    }

    // ── SVUOTA CON CONFERMA ───────────────────────────────────────────────────
    function confermaVuotaCarrello() {
      showPWModal({
        title: "Svuota carrello",
        message: "Sei sicuro di voler rimuovere tutti i vini selezionati?",
        actions: [
          {
            label: "Annulla",
            primary: false
          },
          {
            label: "Svuota",
            primary: true,
            onClick: () => {
              svuotaCarrello();
              renderCarrello();
            }
          }
        ]
      });
    }

    // ── PROPOSTE SALVATE ──────────────────────────────────────────────────────
    let proposteAperte = false;

    function toggleProposte() {
      proposteAperte = !proposteAperte;
      const panel  = document.getElementById("proposte-panel");
      const arrow  = document.getElementById("proposte-arrow");
      panel.style.display = proposteAperte ? "block" : "none";
      arrow.textContent   = proposteAperte ? "▲" : "▼";

      if (proposteAperte) {
        renderProposte();
        setTimeout(() => document.getElementById("proposte-search").focus(), 50);
      }
    }

    function renderProposte() {
      const lista  = document.getElementById("proposte-lista");
      const query  = (document.getElementById("proposte-search").value || "")
                       .trim().toLowerCase();
      const proposte = getProposteSalvate();

      // aggiorna badge
      document.getElementById("proposte-badge").textContent = proposte.length;

      const filtrate = query
        ? proposte.filter(p => p.cliente.toLowerCase().includes(query))
        : proposte;

      if (filtrate.length === 0) {
        lista.innerHTML = `
          <div class="proposte-vuoto">
            ${query ? "Nessun cliente trovato." : "Nessuna proposta salvata."}
          </div>`;
        return;
      }

    lista.innerHTML = "";
    filtrate.forEach(p => {
      const nVini      = p.vini ? p.vini.length : 0;
      const scontoTxt  = p.sconto > 0 ? ` · Sconto ${p.sconto}%` : "";
      const clienteEsc = p.cliente.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

      const div = document.createElement("div");
      div.className = "proposta-item";
      div.innerHTML = `
        <div class="proposta-item-info">
          <div class="proposta-item-cliente">${p.cliente}</div>
          <div class="proposta-item-sub">
            ${p.data} · ${nVini} vin${nVini === 1 ? "o" : "i"}${scontoTxt}
          </div>
        </div>
        <button class="proposta-item-btn" onclick="caricaProposta('${clienteEsc}')">
          Carica
        </button>
        <button class="proposta-item-delete" onclick="eliminaProposta('${clienteEsc}')" title="Elimina">
          🗑️
        </button>
      `;
      lista.appendChild(div);
    });
    }

    function caricaProposta(clienteNome) {
      const proposte = getProposteSalvate();
      const p = proposte.find(
        x => x.cliente.toLowerCase() === clienteNome.toLowerCase()
      );
      if (!p) return;

      const carrelloAttuale = getCarrello();

      if (carrelloAttuale.length === 0) {
        eseguiCaricaProposta(p, "sostituisci");
        return;
      }

      showPWModal({
        title: `Carica "${p.cliente}"`,
        message: `Hai ${carrelloAttuale.length} vin${carrelloAttuale.length === 1 ? "o" : "i"} nel carrello attuale.\nCome vuoi procedere?`,
        actions: [
          {
            label: "Annulla",
            primary: false
          },
          {
            label: "Aggiungi",
            primary: false,
            onClick: () => eseguiCaricaProposta(p, "aggiungi")
          },
          {
            label: "Sostituisci",
            primary: true,
            onClick: () => eseguiCaricaProposta(p, "sostituisci")
          }
        ]
      });
    }

    function eseguiCaricaProposta(p, modalita) {
      if (modalita === "sostituisci") {
        setCarrello(p.vini);
      } else {
        const codiciEsistenti = new Set(getCarrello().map(v => v.codice));
        const nuovi     = p.vini.filter(v => !codiciEsistenti.has(v.codice));
        const duplicati = p.vini.length - nuovi.length;
        setCarrello([...getCarrello(), ...nuovi]);

        if (duplicati > 0) {
          // salva e aggiorna prima di mostrare il modal
          localStorage.setItem("proposta_cliente", p.cliente);
          localStorage.setItem("proposta_sconto",  String(p.sconto || 0));
          renderCarrello();

          showPWModal({
            title: "Vini aggiunti",
            message: `${nuovi.length} vini aggiunti al carrello.\n${duplicati} già presenti e ignorati.`,
            actions: [
              { label: "Rimani qui", primary: false },
              {
                label: "Vai a Proposta →",
                primary: true,
                onClick: () => navigateTo("/planet-wine/proposta.html")
              }
            ]
          });
          return;
        }
      }

      // salva cliente e sconto per precompilare proposta
      localStorage.setItem("proposta_cliente", p.cliente);
      localStorage.setItem("proposta_sconto",  String(p.sconto || 0));
      renderCarrello();

      showPWModal({
        title: "Proposta caricata",
        message: `"${p.cliente}" — ${p.vini.length} vini caricati nel carrello.`,
        actions: [
          { label: "Rimani qui", primary: false },
          {
            label: "Vai a Proposta →",
            primary: true,
            onClick: () => navigateTo("/planet-wine/proposta.html")
          }
        ]
      });
    }

    // ── ELIMINA PROPOSTA ──────────────────────────────────────────────────────
    function eliminaProposta(clienteNome) {
      const proposte = getProposteSalvate();
      const p = proposte.find(
        x => x.cliente.toLowerCase() === clienteNome.toLowerCase()
      );
      if (!p) return;

      showPWModal({
        title: "Elimina proposta",
        message: `Vuoi eliminare la proposta salvata per "${p.cliente}"?\nQuesta azione non è reversibile.`,
        actions: [
          {
            label: "Annulla",
            primary: false
          },
          {
            label: "Elimina",
            primary: true,
            onClick: () => {
              const nuove = proposte.filter(
                x => x.cliente.toLowerCase() !== clienteNome.toLowerCase()
              );
              localStorage.setItem("proposte_salvate", JSON.stringify(nuove));
              renderProposte();
            }
          }
        ]
      });
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    renderCarrello();
    document.getElementById("proposte-badge").textContent =
      getProposteSalvate().length;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/planet-wine/sw.js', { scope: '/planet-wine/' })
        .then(reg => console.log('✓ Service Worker registrato', reg))
        .catch(err => console.error('✗ Service Worker fallito:', err));
    }
  </script>
</body>
</html>
